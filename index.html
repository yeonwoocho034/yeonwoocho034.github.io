<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yeonwoo cho</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g: #68db42;
      --bg: #ffffff;
      --text: #0e0e0e;
      --text-muted: #b4b4b4;
      --text-faint: #656565;
      --border: #e5e5e5;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* ── NAV ── */
    .site-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .site-header-left { display: flex; flex-direction: column; justify-content: flex-end; }
    .site-header-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; padding-bottom: 0.3rem; }
    nav { display: contents; }

    .site-name {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
      list-style: none;
      margin-top: auto;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }

    /* ── HERO ── */
    .hero { margin-top: 2.5rem; }

    .hero h1 {
      font-size: 42px;
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--g);
      margin-bottom: 1rem;
    }

    .hero-sub {
      font-size: 16px;
      color: var(--text-faint);
      letter-spacing: 0.02em;
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── POSTS GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .main-post {
      padding: 2rem 2.5rem 2rem 0;
      border-right: 1px solid var(--border);
      cursor: pointer;
    }

    .main-post:hover .post-title { opacity: 0.6; }

    .post-num {
      font-size: 10px;
      color: var(--g);
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .post-title {
      font-size: 22px;
      font-weight: 350;
      line-height: 1.3;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 0.8rem;
      transition: opacity 0.15s;
    }

    .post-body {
      font-size: 13px;
      line-height: 1.9;
      color: var(--text);
    }

    .side-posts { display: flex; flex-direction: column; }

    .side-post {
      padding: 1.2rem 0 1.2rem 1.8rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      flex: 1;
      transition: background 0.1s;
    }

    .side-post:last-child { border-bottom: none; }
    .side-post:hover .post-title-sm { opacity: 0.6; }

    .post-title-sm {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 0.5rem;
      transition: opacity 0.15s;
    }

    .post-date {
      font-size: 13px;
      color: var(--text-faint);
    }

    /* ── SECTION HEADER ── */
    .section-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1.2rem 0 0;
    }

    .section-label { font-size: 13px; color: var(--text-faint); font-weight: 300; }

    .section-more {
      font-size: 13px;
      color: var(--text-faint);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
    }

    .section-more:hover { color: var(--text-muted); }

    /* ── QUOTES ── */
    .quotes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .quote {
      padding: 1.5rem 1.5rem 1.5rem 0;
      border-right: 1px solid var(--border);
      cursor: pointer;
    }

    .quote:last-child { border-right: none; padding-right: 0; }
    .quote:not(:first-child) { padding-left: 1.5rem; }
    .quote:hover .q-text { opacity: 0.6; }

    .q-text {
      font-size: 13px;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 0.8rem;
      transition: opacity 0.15s;
    }

    .q-src {
      font-size: 14px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
    }

    /* ── GUESTBOOK BAR ── */
    .guestbook-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 0;
    }

    .gb-left { font-size: 11px; color: var(--text-faint); }

    .gb-link {
      font-size: 10px;
      color: var(--g);
      cursor: pointer;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .gb-link:hover { opacity: 0.7; }

    /* ── GUESTBOOK PAGE ── */
    .guestbook-list {
      border-top: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .gb-entry {
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--border);
    }

    .gb-entry-name {
      font-size: 15px;
      font-weight: 400;
      color: var(--g);
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    .gb-entry-msg {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .gb-entry-date {
      font-size: 12px;
      color: var(--text-faint);
    }

    .gb-form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .gb-form input,
    .gb-form textarea {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0;
      outline: none;
      resize: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .gb-form input::placeholder,
    .gb-form textarea::placeholder { color: var(--text-faint); }

    .gb-form input:focus,
    .gb-form textarea:focus { border-bottom-color: var(--text-muted); }

    .gb-submit {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--g);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.4rem 0;
      text-align: left;
      transition: opacity 0.15s;
    }

    .gb-submit:hover { opacity: 0.6; }

    /* ── ARTICLE VIEW ── */
    .article-back {
      font-size: 13px;
      color: var(--text-faint);
      cursor: pointer;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      display: inline-block;
      transition: color 0.15s;
      text-decoration: none;
    }

    .article-back:hover { color: var(--text-faint); }

    .article-header {
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .article-num {
      font-size: 13px;
      color: var(--g);
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .article-title {
      font-size: 28px;
      font-weight: 350;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .article-date {
      font-size: 15px;
      color: var(--text-faint);
    }

    .article-body {
      font-size: 14px;
      font-weight: 350;
      line-height: 2;
      color: var(--text);
      max-width: 800px;
    }

    .article-body p { margin-bottom: 1.4rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      /* HEADER */
      .site-header { grid-template-columns: 1fr; gap: 1rem; }
      .site-header-right { align-items: flex-start; margin-top: 0.5rem; }
      .nav-links { flex-direction: row; flex-wrap: wrap; align-items: flex-start; gap: 0.6rem; }

      /* HERO */
      .hero h1 { font-size: 32px; }

      /* HOME SHOWCASE */
      .showcase-photo img { width: 100%; height: auto; display: block; }

      /* GRID */
      .grid { grid-template-columns: 1fr; }
      .main-post { border-right: none; padding-right: 0; border-bottom: 1px solid var(--border); }
      .side-post { padding-left: 0; }

      /* QUOTES */
      .quotes { grid-template-columns: 1fr; }
      .quote { border-right: none; padding-left: 0; padding-right: 0; }
      .quote:not(:first-child) { padding-left: 0; }
      .quotes-page-grid { grid-template-columns: 1fr; }
      .quote-full { border-right: none; padding-left: 0; padding-right: 0; }
      .quote-full:nth-child(3n+2),
      .quote-full:nth-child(3n+3) { padding-left: 0; }

      /* GALLERY */
      .gallery-wrap {
        grid-template-columns: 1fr 4fr;
        gap: 0.6rem;
      }
      .gallery-photo { width: 100%; margin-right: 0; }
      .date-tooltip { display: none; }

      /* GUESTBOOK */
      .guestbook-list { border-top: 1px solid var(--border); }
      .gb-entry { display: block; }
    }
    .accordion-item { border-bottom: 1px solid var(--border); }
    .accordion-head {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 1rem 0; cursor: pointer;
      font-size: 14px; font-weight: 400; color: var(--text);
    }
    .acc-arr { font-size: 30px; font-weight: 300; color: var(--text-faint); transition: transform 0.2s; }
    .accordion-head.open .acc-arr { transform: rotate(90deg); }
    .accordion-body { display: none; padding: 0 0 1.2rem; }
    .accordion-body.open { display: block; }
    .accordion-body .q-text {
      font-size: 13px; font-weight: 350; line-height: 1.85;
      color: var(--text); padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .accordion-body .q-text:last-child { border-bottom: none; }
    .accordion-body .q-text { margin-bottom: 0; }
    

    /* ── SHOWCASE ── */
    .showcase {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2.5rem;
    }
    .showcase-photo img { width: 70%; height: auto; display: block; }
    .showcase-text {
      display: flex;
      flex-direction: column;
    }
    .showcase-note {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 0;
    }
    .showcase-spotify { margin-top: 1.2rem; flex-shrink: 0; }
    .showcase-date {
      font-size: 13px;
      color: var(--text-faint);
      margin-top: 1rem;
      letter-spacing: 0.04em;
    }

    /* ── GALLERY ── */
    .gallery-wrap {
      display: grid;
      grid-template-columns: 1fr 2.5fr;
      gap: 1.5rem;
      align-items: start;
    }
    .gallery {
      width: 100%;
    }
    .gallery-photo { width: calc(50% - 3px); margin-bottom: 6px; float: left; position: relative; }
    .gallery-photo:nth-child(odd) { margin-right: 6px; }
    .gallery-photo img { width: 100%; height: auto; display: block; cursor: pointer; transition: opacity 0.2s; }
    .gallery-photo img:hover { opacity: 0.75; }
    .gallery-photo.selected img { opacity: 0.45; }
    .gallery-photo .date-tooltip {
      position: absolute;
      right: -4.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.5);
      color: var(--text);
      font-size: 10px;
      letter-spacing: 0.04em;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    .gallery-photo:hover .date-tooltip { opacity: 1; }

    /* ── GALLERY PANEL ── */
    .gallery-panel {
      position: sticky;
      top: 2rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    .gallery-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .gallery-panel-img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 1.2rem;
    }
    .gallery-panel-note {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.9;
      color: var(--text);
      text-align: right;
      margin-bottom: 0.4rem;
    }
    .gallery-panel-date {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.06em;
      text-align: right;
      display: block;
    }
    .gallery-panel-close {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 1rem;
      display: inline-block;
      transition: color 0.15s;
    }
    .gallery-panel-close:hover { color: var(--text); }

    /* ── TEA ── */
    .tea-list { border-top: 1px solid var(--border); }
    .tea-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .tea-row:hover .tea-title { opacity: 0.5; }
    .tea-thumb {
      width: 56px;
      height: 42px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
      background: var(--border);
    }
    .tea-thumb-empty {
      width: 56px;
      height: 42px;
      background: var(--border);
      flex-shrink: 0;
    }
    .tea-title { font-size: 14px; font-weight: 400; color: var(--text); letter-spacing: 0.01em; flex: 1; transition: opacity 0.15s; }
    .tea-date { font-size: 13px; color: var(--text-faint); flex-shrink: 0; }

    /* ── TEA ITEM ── */
    .tea-photos { display: flex; gap: 4px; margin-bottom: 2rem; }
    .tea-photos img { width: 60%; height: auto; display: block; }
    .tea-body {
      font-size: 14px;
      font-weight: 400;
      line-height: 2;
      color: var(--text);
      max-width: 600px;
    }
    .tea-body p { margin-bottom: 1.4rem; }

    /* ── RECENT ── */
    .recent-label { font-size: 13px; letter-spacing: 0.15em; color: var(--text-faint); margin-bottom: 0.8rem; }
    .recent-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.8rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .recent-row:hover .recent-title { opacity: 0.5; }
    .recent-title { font-size: 13px; font-weight: 400; color: var(--text); transition: opacity 0.15s; }
    .recent-date { font-size: 13px; color: var(--text-faint); }

    /* ── THOUGHTS LIST ── */
    .thoughts-list { border-top: 1px solid var(--border); }
    .thought-row {
      display: flex; align-items: baseline; gap: 1rem;
      padding: 1rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .thought-row:hover .thought-title { opacity: 0.5; }
    .thought-num { font-size: 11px; color: var(--g); letter-spacing: 0.06em; flex-shrink: 0; }
    .thought-title { font-size: 14px; font-weight: 400; color: var(--text); flex: 1; transition: opacity 0.15s; }
    .thought-date { font-size: 13px; color: var(--text-faint); flex-shrink: 0; }
    /* ── PREV/NEXT ── */
    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .article-nav a {
      font-size: 13px;
      color: var(--text-faint);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .article-nav a:hover { color: var(--text); }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .fade-up {
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
    .fade-in {
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    /* ── PREV/NEXT ── */
    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .article-nav a {
      font-size: 13px;
      color: var(--text-faint);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .article-nav a:hover { color: var(--text); }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .fade-up { opacity: 0; animation: fadeUp 0.4s ease forwards; }
    .fade-in { opacity: 0; animation: fadeIn 0.4s ease forwards; }

    /* ── GALLERY SORT ── */
    .gallery-sort { display: flex; gap: 1.2rem; margin-bottom: 1.2rem; }
    .sort-btn {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-size: 14px; font-weight: 350; letter-spacing: 0.06em;
      color: var(--text-faint); background: none; border: none;
      cursor: pointer; padding: 0; transition: color 0.15s;
    }
    .sort-btn.active { color: var(--text); }
    .sort-btn:hover { color: var(--text-muted); }

    .article-body a, .tea-body a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
    }
  </style>

    const firebaseConfig = {
      apiKey: "AIzaSyDM8OHa2lbRa2lM2OTn8sJryGgBTxokCBU",
      authDomain: "yeonwoo-cho.firebaseapp.com",
      databaseURL: "https://yeonwoo-cho-default-rtdb.firebaseio.com",
      projectId: "yeonwoo-cho",
      storageBucket: "yeonwoo-cho.firebasestorage.app",
      messagingSenderId: "542377853471",
      appId: "1:542377853471:web:18672ed0212285525f8b2a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gbRef = ref(db, 'guestbook');

    window._fbDb = db;
    window._gbRef = gbRef;
    window._fbPush = push;
    window._fbOnValue = onValue;
    window._fbRemove = remove;
    window._fbRef = ref;

    onValue(gbRef, (snapshot) => {
      const data = snapshot.val();
      const entries = data ? Object.entries(data).reverse().map(([key, val]) => ({ ...val, key })) : [];
      window._gbEntries = entries;
      if (typeof window.renderGuestbook === 'function') window.renderGuestbook();
    });
  </script>

<div class="wrap">

  <div class="site-header">
    <div class="site-header-left">
      <a class="site-name" href="#" onclick="showPage('home')">home</a>
      <div class="hero">

    </div>

      <nav>
        <ul class="nav-links">
          <li><a href="#" onclick="showPage('thoughts')" id="nav-thoughts">thoughts</a></li>
          <li><a href="#" onclick="showPage('gallery')" id="nav-gallery">gallery</a></li>

        </ul>
      </nav>
    </div>
  </div>

  <!-- ── HOME ── -->
  <div id="page-home" class="page active">
    <div class="showcase">
      <div class="showcase-photo">
        <!-- 사진 파일명 여기서 수정 -->
        <img src="photos/19.jpeg" alt="">
      </div>
      <div class="showcase-text">
        <!-- 짧은 글 여기서 수정 -->
        <p class="showcase-note">초록색은 봐도봐도 좋아 ~!!!</p>
        <p class="showcase-date">Apr 26, 2026<br><br></p>

    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    const navMap = { thoughts: 'nav-thoughts', quotes: 'nav-quotes', gallery: 'nav-gallery', tea: 'nav-tea', 'tea-item': 'nav-tea', guestbook: 'nav-guestbook', archive: 'nav-archive', 'archive-item': 'nav-archive' };
    if (navMap[name]) document.getElementById(navMap[name]).classList.add('active');
    if (name === 'guestbook') renderGuestbook();
    if (name === 'thoughts') renderThoughts();
    if (name === 'quotes') renderQuotesPage();
    if (name === 'gallery') renderGallery();
    if (name === 'archive') renderArchive();
    if (name === 'tea') renderTea();
    location.hash = name === 'home' ? '' : name;
    window.scrollTo(0, 0);
    return false;
  }

  function showArticle(id) {
    id = parseInt(id);
    const a = articles[id];
    document.getElementById('article-num').textContent = a.num;
    document.getElementById('article-title').textContent = a.title;
    document.getElementById('article-date').textContent = a.date;
    document.getElementById('article-body').innerHTML = a.body;
    const ids = Object.keys(articles).map(Number).sort((a,b) => b-a);
    const idx = ids.indexOf(id);
    const prev = ids[idx+1];
    const next = ids[idx-1];
    document.getElementById('article-nav').innerHTML =
      `<span>${prev ? `<a onclick="showArticle(${prev})">← ${articles[prev].title}</a>` : ''}</span>` +
      `<span>${next ? `<a onclick="showArticle(${next})">${articles[next].title} →</a>` : ''}</span>`;
    location.hash = 'article-' + id;
    showPage('article');
  }

  function handleGbSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('gb-name').value.trim();
    const msg = document.getElementById('gb-msg').value.trim();
    if (!name || !msg) return;
    const today = new Date();
    const date = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    if (window._fbPush && window._gbRef) {
      window._fbPush(window._gbRef, { name, msg, date });
    }
    document.getElementById('gb-name').value = '';
    document.getElementById('gb-msg').value = '';
  }

  renderHomeRecent();
  renderArchive();
  renderThoughts();
  renderGallery();
  renderTea();
  renderQuotesPage();

  const hash = location.hash.replace('#', '');
  if (hash === 'thoughts') showPage('thoughts');
  else if (hash === 'quotes') showPage('quotes');
  else if (hash === 'gallery') showPage('gallery');
  else if (hash === 'tea') showPage('tea');
  else if (hash === 'guestbook') showPage('guestbook');
  else if (hash === 'archive') showPage('archive');
  else if (hash.startsWith('article-')) showArticle(parseInt(hash.replace('article-', '')));
  else showPage('home');
  
  function toggleAcc(el) {
    el.classList.toggle('open');
    el.nextElementSibling.classList.toggle('open');
  } 
</script>
</body>
</html>
