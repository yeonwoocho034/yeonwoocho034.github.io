<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yeonwoo cho</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g: #68db42;
      --bg: #ffffff;
      --text: #0e0e0e;
      --text-muted: #b4b4b4;
      --text-faint: #656565;
      --border: #e5e5e5;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3rem;
    }

    .site-name {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 1.8rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }

    /* ── HERO ── */
    .hero {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--g);
      margin-bottom: 1rem;
    }

    .hero-sub {
      font-size: 17px;
      color: var(--text-faint);
      letter-spacing: 0.02em;
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── POSTS GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .main-post {
      padding: 2rem 2.5rem 2rem 0;
      border-right: 1px solid var(--border);
      cursor: pointer;
    }

    .main-post:hover .post-title { opacity: 0.6; }

    .post-num {
      font-size: 10px;
      color: var(--g);
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .post-title {
      font-size: 22px;
      font-weight: 350;
      line-height: 1.3;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 0.8rem;
      transition: opacity 0.15s;
    }

    .post-body {
      font-size: 13px;
      line-height: 1.9;
      color: var(--text);
    }

    .side-posts { display: flex; flex-direction: column; }

    .side-post {
      padding: 1.2rem 0 1.2rem 1.8rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      flex: 1;
      transition: background 0.1s;
    }

    .side-post:last-child { border-bottom: none; }
    .side-post:hover .post-title-sm { opacity: 0.6; }

    .post-title-sm {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 0.5rem;
      transition: opacity 0.15s;
    }

    .post-date {
      font-size: 13px;
      color: var(--text-faint);
    }

    /* ── SECTION HEADER ── */
    .section-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1.2rem 0 0;
    }

    .section-label { font-size: 13px; color: var(--text-faint); font-weight: 300; }

    .section-more {
      font-size: 13px;
      color: var(--text-faint);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s;
    }

    .section-more:hover { color: var(--text-muted); }

    /* ── QUOTES ── */
    .quotes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .quote {
      padding: 1.5rem 1.5rem 1.5rem 0;
      border-right: 1px solid var(--border);
      cursor: pointer;
    }

    .quote:last-child { border-right: none; padding-right: 0; }
    .quote:not(:first-child) { padding-left: 1.5rem; }
    .quote:hover .q-text { opacity: 0.6; }

    .q-text {
      font-size: 13px;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 0.8rem;
      transition: opacity 0.15s;
    }

    .q-src {
      font-size: 14px;
      color: var(--text-faint);
      letter-spacing: 0.04em;
    }

    /* ── GUESTBOOK BAR ── */
    .guestbook-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 0;
    }

    .gb-left { font-size: 11px; color: var(--text-faint); }

    .gb-link {
      font-size: 10px;
      color: var(--g);
      cursor: pointer;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .gb-link:hover { opacity: 0.7; }

    /* ── GUESTBOOK PAGE ── */
    .guestbook-list {
      border-top: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .gb-entry {
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--border);
    }

    .gb-entry-name {
      font-size: 15px;
      font-weight: 400;
      color: var(--g);
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    .gb-entry-msg {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .gb-entry-date {
      font-size: 12px;
      color: var(--text-faint);
    }

    .gb-form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .gb-form input,
    .gb-form textarea {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0;
      outline: none;
      resize: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .gb-form input::placeholder,
    .gb-form textarea::placeholder { color: var(--text-faint); }

    .gb-form input:focus,
    .gb-form textarea:focus { border-bottom-color: var(--text-muted); }

    .gb-submit {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--g);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.4rem 0;
      text-align: left;
      transition: opacity 0.15s;
    }

    .gb-submit:hover { opacity: 0.6; }

    /* ── ARTICLE VIEW ── */
    .article-back {
      font-size: 13px;
      color: var(--text-faint);
      cursor: pointer;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      display: inline-block;
      transition: color 0.15s;
      text-decoration: none;
    }

    .article-back:hover { color: var(--text-faint); }

    .article-header {
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .article-num {
      font-size: 13px;
      color: var(--g);
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .article-title {
      font-size: 28px;
      font-weight: 350;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .article-date {
      font-size: 15px;
      color: var(--text-faint);
    }

    .article-body {
      font-size: 14px;
      font-weight: 350;
      line-height: 2;
      color: var(--text);
      max-width: 600px;
    }

    .article-body p { margin-bottom: 1.4rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .main-post { border-right: none; padding-right: 0; border-bottom: 1px solid var(--border); }
      .side-post { padding-left: 0; }
      .quotes { grid-template-columns: 1fr; }
      .quote { border-right: none; padding-left: 0; padding-right: 0; }
      .quote:not(:first-child) { padding-left: 0; }
      .quotes-page-grid { grid-template-columns: 1fr; }
      .quote-full { border-right: none; padding-left: 0; padding-right: 0; }
      .quote-full:nth-child(3n+2),
      .quote-full:nth-child(3n+3) { padding-left: 0; }
      .hero h1 { font-size: 32px; }
    }
    .accordion-item { border-bottom: 1px solid var(--border); }
    .accordion-head {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 1rem 0; cursor: pointer;
      font-size: 14px; font-weight: 400; color: var(--text);
    }
    .acc-arr { font-size: 30px; font-weight: 300; color: var(--text-faint); transition: transform 0.2s; }
    .accordion-head.open .acc-arr { transform: rotate(90deg); }
    .accordion-body { display: none; padding: 0 0 1.2rem; }
    .accordion-body.open { display: block; }
    .accordion-body .q-text {
      font-size: 13px; font-weight: 350; line-height: 1.85;
      color: var(--text); padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .accordion-body .q-text:last-child { border-bottom: none; }
    .accordion-body .q-text { margin-bottom: 0; }
    

    /* ── SHOWCASE ── */
    .showcase {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2.5rem;
      align-items: end;
    }
    .showcase-photo img { width: 100%; height: auto; display: block; }
    .showcase-text {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .showcase-note {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: auto;
    }
    .showcase-spotify { margin-top: 1.5rem; flex-shrink: 0; }
    .showcase-date {
      font-size: 13px;
      color: var(--text-faint);
      margin-top: 1rem;
      letter-spacing: 0.04em;
    }

    /* ── GALLERY ── */
    .gallery-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    .gallery {
      columns: 2;
      column-gap: 6px;
    }
    .gallery-photo { break-inside: avoid; margin-bottom: 6px; }
    .gallery-photo img { width: 100%; height: auto; display: block; cursor: pointer; transition: opacity 0.2s; }
    .gallery-photo img:hover { opacity: 0.75; }
    .gallery-photo.selected img { opacity: 0.45; }

    /* ── GALLERY PANEL ── */
    .gallery-panel {
      position: sticky;
      top: 2rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    .gallery-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .gallery-panel-img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 1.2rem;
    }
    .gallery-panel-note {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.9;
      color: var(--text);
      text-align: right;
      margin-bottom: 0.4rem;
    }
    .gallery-panel-date {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.06em;
      text-align: right;
      display: block;
    }
    .gallery-panel-close {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 1rem;
      display: inline-block;
      transition: color 0.15s;
    }
    .gallery-panel-close:hover { color: var(--text); }

    /* ── TEA ── */
    .tea-list { border-top: 1px solid var(--border); }
    .tea-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .tea-row:hover .tea-title { opacity: 0.5; }
    .tea-thumb {
      width: 56px;
      height: 42px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
      background: var(--border);
    }
    .tea-thumb-empty {
      width: 56px;
      height: 42px;
      background: var(--border);
      flex-shrink: 0;
    }
    .tea-title { font-size: 14px; font-weight: 400; color: var(--text); letter-spacing: 0.01em; flex: 1; transition: opacity 0.15s; }
    .tea-date { font-size: 13px; color: var(--text-faint); flex-shrink: 0; }

    /* ── TEA ITEM ── */
    .tea-photos { display: flex; gap: 5px; margin-bottom: 2rem; }
    .tea-photos img { width: 100%; height: auto; display: block; flex: 1; }
    .tea-body {
      font-size: 14px;
      font-weight: 400;
      line-height: 2;
      color: var(--text);
      max-width: 600px;
    }
    .tea-body p { margin-bottom: 1.4rem; }

    /* ── RECENT ── */
    .recent-label { font-size: 13px; letter-spacing: 0.15em; color: var(--text-faint); margin-bottom: 0.8rem; }
    .recent-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.8rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .recent-row:hover .recent-title { opacity: 0.5; }
    .recent-title { font-size: 13px; font-weight: 400; color: var(--text); transition: opacity 0.15s; }
    .recent-date { font-size: 13px; color: var(--text-faint); }

    /* ── THOUGHTS LIST ── */
    .thoughts-list { border-top: 1px solid var(--border); }
    .thought-row {
      display: flex; align-items: baseline; gap: 1rem;
      padding: 1rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .thought-row:hover .thought-title { opacity: 0.5; }
    .thought-num { font-size: 11px; color: var(--g); letter-spacing: 0.06em; flex-shrink: 0; }
    .thought-title { font-size: 14px; font-weight: 400; color: var(--text); flex: 1; transition: opacity 0.15s; }
    .thought-date { font-size: 13px; color: var(--text-faint); flex-shrink: 0; }
    /* ── PREV/NEXT ── */
    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .article-nav a {
      font-size: 13px;
      color: var(--text-faint);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .article-nav a:hover { color: var(--text); }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .fade-up {
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
    .fade-in {
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    /* ── PREV/NEXT ── */
    .article-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .article-nav a {
      font-size: 13px;
      color: var(--text-faint);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .article-nav a:hover { color: var(--text); }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .fade-up { opacity: 0; animation: fadeUp 0.4s ease forwards; }
    .fade-in { opacity: 0; animation: fadeIn 0.4s ease forwards; }

    /* ── GALLERY SORT ── */
    .gallery-sort { display: flex; gap: 1.2rem; margin-bottom: 1.2rem; }
    .sort-btn {
      font-family: 'Helvetica Neue', Helvetica, 'Apple SD Gothic Neo', sans-serif;
      font-size: 14px; font-weight: 350; letter-spacing: 0.06em;
      color: var(--text-faint); background: none; border: none;
      cursor: pointer; padding: 0; transition: color 0.15s;
    }
    .sort-btn.active { color: var(--text); }
    .sort-btn:hover { color: var(--text-muted); }
  </style>
</head>
<body>
<div class="wrap">

  <nav>
    <a class="site-name" href="#" onclick="showPage('home')">home</a>
    <ul class="nav-links">
      <li><a href="#" onclick="showPage('thoughts')" id="nav-thoughts">thoughts</a></li>
      <li><a href="#" onclick="showPage('quotes')" id="nav-quotes">quotes</a></li>
      <li><a href="#" onclick="showPage('gallery')" id="nav-gallery">gallery</a></li>
      <li><a href="#" onclick="showPage('tea')" id="nav-tea">tea</a></li>
      <li><a href="#" onclick="showPage('guestbook')" id="nav-guestbook">방명록</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>i'm<br>that<br>sisyphus</h1>
      <p class="hero-sub">a very personal documentation</p>
  </div>

  <!-- ── HOME ── -->
  <div id="page-home" class="page active">
    <div class="showcase">
      <div class="showcase-photo">
        <!-- 사진 파일명 여기서 수정 -->
        <img src="photos/1.jpeg" alt="">
      </div>
      <div class="showcase-text">
        <!-- 짧은 글 여기서 수정 -->
        <p class="showcase-note">오랫동안 생각만 해오던 웹사이트를 드디어 열었다.<br>다 만드는 데에 진짜 얼마 안 걸림.<br>처음 개인 웹사이트를 만들고 싶어했던 때가 2년 전이었는데,<br>그새 웹사이트도 뚝딱 만들 수 있는 사람이 되었구나 연우야!</p>
        <p class="showcase-date">Mar 21, 2026<br></p>
        <!-- Spotify: 공유 → Embed track → src 주소만 바꾸면 돼요 -->
        <div class="showcase-spotify">
          <iframe style="border-radius:4px" src="https://open.spotify.com/embed/track/6FiYWKCNW1GaP3Xwxuiilo" width="100%" height="120" frameborder="0" allow="encrypted-media"></iframe>
        </div>
      </div>
    </div>
    <div id="home-recent"></div>
  </div>

  <!-- ── ARTICLE ── -->
  <div id="page-article" class="page">
    <a class="article-back" href="#" onclick="showPage('thoughts')">← 돌아가기</a>
    <div class="article-header">
      <p class="article-num" id="article-num"></p>
      <h1 class="article-title" id="article-title"></h1>
      <p class="article-date" id="article-date"></p>
    </div>
    <div class="article-body" id="article-body"></div>
    <div class="article-nav" id="article-nav"></div>
  </div>

  <!-- ── THOUGHTS PAGE ── -->
  <div id="page-thoughts" class="page">
    <div class="thoughts-list" id="thoughts-list"></div>
  </div>

  <!-- ── QUOTES PAGE ── -->
  <div id="page-quotes" class="page">
    <div id="quotes-accordion" style="border-top:1px solid var(--border);"></div>
  </div>

  <!-- ── GALLERY PAGE ── -->
  <div id="page-gallery" class="page">
    <div class="gallery-sort" style="margin-bottom:1.2rem;">
      <button class="sort-btn active" id="sort-recent" onclick="setGallerySort('recent')">최근 추가 순</button>
      <button class="sort-btn" id="sort-oldest" onclick="setGallerySort('oldest')">오래된 순</button>
    </div>
    <div class="gallery-wrap">
      <div class="gallery" id="gallery-grid"></div>
      <div class="gallery-panel" id="gallery-panel">
        <img class="gallery-panel-img" id="gallery-panel-img" src="" alt="">
        <p class="gallery-panel-note" id="gallery-panel-note"></p>
        <p class="gallery-panel-date" id="gallery-panel-date"></p>
        <span class="gallery-panel-close" onclick="closeGalleryPanel()">닫기 ×</span>
      </div>
    </div>
  </div>

  <!-- ── TEA PAGE ── -->
  <div id="page-tea" class="page">
    <div class="tea-list" id="tea-list"></div>
  </div>

  <!-- ── TEA ITEM PAGE ── -->
  <div id="page-tea-item" class="page">
    <a class="article-back" href="#" onclick="showPage('tea')">← 돌아가기</a>
    <div class="article-header">
      <h1 class="article-title" id="tea-item-title"></h1>
      <p class="article-date" id="tea-item-date"></p>
    </div>
    <div class="tea-photos" id="tea-item-photos"></div>
    <div class="tea-body" id="tea-item-body"></div>
    <div class="article-nav" id="tea-item-nav"></div>
  </div>

  <!-- ── GUESTBOOK PAGE ── -->
  <div id="page-guestbook" class="page">
    <div class="guestbook-list" id="gb-list"></div>
    <form class="gb-form" onsubmit="handleGbSubmit(event)">
      <input type="text" name="name" id="gb-name" placeholder="이름" maxlength="20" required>
      <textarea name="message" id="gb-msg" placeholder="한 마디 남겨주세요" rows="3" required></textarea>
      <button type="submit" class="gb-submit">남기기 →</button>
    </form>
  </div>

</div>

<script>
  const teaData = [
    {
      title: 'LUCIPIA FRESH TEA, Momo Green Tea',
      date: 'Mar 21, 2026',
      photos: ['photos/tea1.jpeg'],
      body: '<p>나중에 적어야지. 아주 따뜻하게 익힌 복숭아향이 남. 맛있음.</p>'
    },
    {
      title: '우지 교쿠로',
      date: '2025. 08',
      photos: ['photos/car2.jpeg'],
      body: '<p>여기에 차에 대한 기록을 적어주세요.</p>'
    }
  ];

  function renderTea() {
    const el = document.getElementById('tea-list');
    el.innerHTML = teaData.map((c, i) => `
      <div class="tea-row fade-up" style="animation-delay:${i*0.08}s" onclick="showTeaItem(${i})">
        ${c.photos[0]
          ? `<img class="tea-thumb" src="${c.photos[0]}" alt="" onerror="this.outerHTML='<div class=car-thumb-empty></div>'">`
          : '<div class="tea-thumb-empty"></div>'}
        <span class="tea-title">${c.title}</span>
        <span class="tea-date">${c.date}</span>
      </div>`).join('');
  }

  function showTeaItem(i) {
    const c = teaData[i];
    document.getElementById('tea-item-title').textContent = c.title;
    document.getElementById('tea-item-date').textContent = c.date;
    document.getElementById('tea-item-photos').innerHTML = c.photos.map(p => `<img src="${p}" alt="">`).join('');
    document.getElementById('tea-item-body').innerHTML = c.body;
    const prev = teaData[i+1];
    const next = teaData[i-1];
    document.getElementById('tea-item-nav').innerHTML =
      `<span>${prev ? `<a onclick="showTeaItem(${i+1})">← ${prev.title}</a>` : ''}</span>` +
      `<span>${next ? `<a onclick="showTeaItem(${i-1})">${next.title} →</a>` : ''}</span>`;
    showPage('tea-item');
  }

  const galleryData = [
    {
      photo: 'photos/1.jpeg',
      note: '한남동 뒷골목',
      date: 'Mar 8, 2026'
    },
    {
      photo: 'photos/2.jpeg',
      note: 'Estelle 언니랑 Goldstein Reserve에서. 맨발 토스트!',
      date: 'Jan 4, 2026'
    },
    {
      photo: 'photos/3.jpeg',
      note: 'Coogie Beach, Sydney. Wylies Baths.',
      date: 'Jan 4, 2026'
    }
  ];

  let gallerySortMode = 'recent';

  function setGallerySort(mode) {
    gallerySortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sort-' + mode).classList.add('active');
    renderGallery();
  }

  function renderGallery() {
    const el = document.getElementById('gallery-grid');
    let items = galleryData.map((g, i) => ({ ...g, i }));
    if (gallerySortMode === 'recent') items = items.reverse();
    el.innerHTML = items.map((g, idx) => `
      <div class="gallery-photo fade-in" data-idx="${g.i}" style="animation-delay:${(Math.random()*0.3+idx*0.05).toFixed(2)}s" onclick="showGalleryItem(${g.i})">
        <img src="${g.photo}" alt="">
      </div>`).join('');
  }

  function showGalleryItem(i) {
    const g = galleryData[i];
    document.getElementById('gallery-panel-img').src = g.photo;
    document.getElementById('gallery-panel-note').textContent = g.note;
    document.getElementById('gallery-panel-date').textContent = g.date;
    document.getElementById('gallery-panel').classList.add('visible');
    document.querySelectorAll('.gallery-photo').forEach((el, idx) => {
      el.classList.toggle('selected', idx === i);
    });
  }

  function closeGalleryPanel() {
    document.getElementById('gallery-panel').classList.remove('visible');
    document.querySelectorAll('.gallery-photo').forEach(el => el.classList.remove('selected'));
  }

  const quotesData = [
    {
      book: '싯다르타',
      quotes: [
        '지식은 전달할 수 있지만 지혜는 전달할 수 없다.',
        '나는 기다릴 수 있고, 생각할 수 있고, 단식할 수 있다.'
      ]
    },
    {
      book: '불안의 서',
      quotes: [
        '나는 꿈꾸는 것 외에 아무것도 아니다.',
        '모든 것이 나에게는 낯설다, 심지어 나 자신도.'
      ]
    },
    {
      book: '시지프 신화',
      quotes: [
        '우리는 시지프를 행복한 인간으로 상상해야 한다.',
        '부조리는 인간의 부름과 세계의 불합리한 침묵 사이에서 태어난다.'
      ]
    }
  ];

  function renderHomeRecent() {
    const el = document.getElementById('home-recent');
    const sorted = Object.entries(articles).sort((a,b) => b[0]-a[0]).slice(0, 3);
    el.innerHTML = `<p class="recent-label">최근 글</p>` + sorted.map(([id, a]) => `
      <div class="recent-row" onclick="showArticle(${id})">
        <span class="recent-title">${a.title}</span>
        <span class="recent-date">${a.date}</span>
      </div>`).join('');
  }

  function renderThoughts() {
    const el = document.getElementById('thoughts-list');
    const sorted = Object.entries(articles).sort((a,b) => b[0]-a[0]);
    el.innerHTML = sorted.map(([id, a], i) => `
      <div class="thought-row fade-up" style="animation-delay:${i*0.08}s" onclick="showArticle(${id})">
        <span class="thought-num">${a.num}</span>
        <span class="thought-title">${a.title}</span>
        <span class="thought-date">${a.date}</span>
      </div>`).join('');
  }

  function renderQuotesPage() {
    const el = document.getElementById('quotes-accordion');
    el.innerHTML = quotesData.map((b, i) => `
      <div class="accordion-item fade-up" style="animation-delay:${i*0.08}s">
        <div class="accordion-head" onclick="toggleAcc(this)">${b.book} <span class="acc-arr">›</span></div>
        <div class="accordion-body">
          ${b.quotes.map(q => `<p class="q-text">${q}</p>`).join('')}
        </div>
      </div>`).join('');
  }

  const articles = {
    1: {
      num: '001',
      title: '여긴 진짜 내 공간',
      date: 'Mar 21, 2026',
      body: `<p>웃긴다.</p><p>네이버 블로그에서는 내 공간이니까 나가세요 라고 할 수 없잖음.<br>여긴 진짜 내 공간이야.</p><p>하하하하하하하하하하하하하하</p><p>그치만 나가진 마세요 다들.</p>`
    },
    2: {
      num: '002',
      title: '언어가 닿지 않는 곳',
      date: '2025. 08',
      body: `<p>여기에 글 내용을 채워주세요.</p>`
    },
    3: {
      num: '003',
      title: '낯섦에 대하여',
      date: '2025. 09',
      body: `<p>어떤 것들은 처음 보는 순간부터 낯설다. 그 낯섦이 거부감이 아니라 끌림으로 느껴질 때, 우리는 그것을 아름답다고 부른다.</p><p>여기에 글 내용을 채워주세요.</p>`
    }
  };

  let adminMode = false;

  function toggleAdmin() {
    const pw = prompt('비밀번호');
    if (pw === '0304') { adminMode = true; renderGuestbook(); }
  }

  function deleteEntry(idx) {
    const entries = JSON.parse(localStorage.getItem('gb-entries') || '[]');
    entries.splice(idx, 1);
    localStorage.setItem('gb-entries', JSON.stringify(entries));
    renderGuestbook();
  }

  function renderGuestbook() {
    const list = document.getElementById('gb-list');
    const entries = JSON.parse(localStorage.getItem('gb-entries') || '[]');
    list.innerHTML = entries.map((e, i) => `
      <div class="gb-entry fade-up" style="animation-delay:${i*0.08}s">
        <p class="gb-entry-name">${e.name}${adminMode ? ` <span onclick="deleteEntry(${i})" style="cursor:pointer;font-size:12px;color:#aaa;margin-left:8px;">삭제</span>` : ''}</p>
        <p class="gb-entry-msg">${e.msg}</p>
        <p class="gb-entry-date">${e.date}</p>
      </div>`).join('');
    if (!adminMode) {
      list.innerHTML += `<p onclick="toggleAdmin()" style="font-size:11px;color:var(--text-faint);cursor:pointer;padding:1rem 0;">관리</p>`;
    }
  }

  function showPage(name) {
    if (name !== 'quotes') {
      document.querySelectorAll('.accordion-head.open').forEach(h => {
        h.classList.remove('open');
        h.nextElementSibling.classList.remove('open');
      });
    }
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    const navMap = { thoughts: 'nav-thoughts', quotes: 'nav-quotes', gallery: 'nav-gallery', tea: 'nav-tea', 'tea-item': 'nav-tea', guestbook: 'nav-guestbook' };
    if (navMap[name]) document.getElementById(navMap[name]).classList.add('active');
    if (name === 'guestbook') renderGuestbook();
    if (name === 'thoughts') renderThoughts();
    if (name === 'quotes') renderQuotesPage();
    if (name === 'gallery') renderGallery();
    if (name === 'tea') renderTea();
    location.hash = name === 'home' ? '' : name;
    window.scrollTo(0, 0);
    return false;
  }

  function showArticle(id) {
    id = parseInt(id);
    const a = articles[id];
    document.getElementById('article-num').textContent = a.num;
    document.getElementById('article-title').textContent = a.title;
    document.getElementById('article-date').textContent = a.date;
    document.getElementById('article-body').innerHTML = a.body;
    const ids = Object.keys(articles).map(Number).sort((a,b) => b-a);
    const idx = ids.indexOf(id);
    const prev = ids[idx+1];
    const next = ids[idx-1];
    document.getElementById('article-nav').innerHTML =
      `<span>${prev ? `<a onclick="showArticle(${prev})">← ${articles[prev].title}</a>` : ''}</span>` +
      `<span>${next ? `<a onclick="showArticle(${next})">${articles[next].title} →</a>` : ''}</span>`;
    location.hash = 'article-' + id;
    showPage('article');
  }

  function handleGbSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('gb-name').value.trim();
    const msg = document.getElementById('gb-msg').value.trim();
    if (!name || !msg) return;
    const today = new Date();
    const date = `${today.getFullYear()}. ${String(today.getMonth()+1).padStart(2,'0')}. ${String(today.getDate()).padStart(2,'0')}`;
    const entries = JSON.parse(localStorage.getItem('gb-entries') || '[]');
    entries.push({ name, msg, date });
    localStorage.setItem('gb-entries', JSON.stringify(entries));
    fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(new FormData(e.target)).toString()
    }).catch(() => {});
    document.getElementById('gb-name').value = '';
    document.getElementById('gb-msg').value = '';
    renderGuestbook();
  }

  renderHomeRecent();
  renderThoughts();
  renderGallery();
  renderTea();
  renderQuotesPage();

  const hash = location.hash.replace('#', '');
  if (hash === 'thoughts') showPage('thoughts');
  else if (hash === 'quotes') showPage('quotes');
  else if (hash === 'gallery') showPage('gallery');
  else if (hash === 'tea') showPage('tea');
  else if (hash === 'guestbook') showPage('guestbook');
  else if (hash.startsWith('article-')) showArticle(parseInt(hash.replace('article-', '')));
  else showPage('home');
  
  function toggleAcc(el) {
    el.classList.toggle('open');
    el.nextElementSibling.classList.toggle('open');
  } 
</script>
</body>
</html>
